# These substitutions allow the end user to override certain values
substitutions:
  name: "lum-iot-test2"
  friendly_name: "Project Template"
  my_espnow_app: "0x5354"

esp32:
  board: m5stack-atom
  framework:
    type: esp-idf

esphome:
  name: "${name}"
  # Friendly names are used where appropriate in Home Assistant
  friendly_name: "${friendly_name}"
  # Automatically add the mac address to the name
  # so you can use a single firmware for all devices
  name_add_mac_suffix: false

  # This will allow for (future) project identification,
  # configuration and updates.
  project:
    name: LumenSoft.espnow-test
    version: "1.0"

# To be able to get logs from the device via serial and api.
logger:
  level: verbose

espnow:
  auto_add_peer: true
  wifi_channel: 1
  predefined_peers:
    - mac_address: e8:6b:ea:24:22:04
  on_raw_data:
    - logger.log:
        format: "RAW DATA Received from: %s = '%s' RSSI: %d"
        args: [packet->peer_str().c_str(), packet->payload(), packet->rssi()]

  custom_apps:
    - app_id: ${my_espnow_app}
      on_receive:
        - logger.log:
            format: "%s| Received: %s, cmd: %02x, RSSI: %d"
            args:
              [
                packet->info().c_str(),
                packet->payload(),
                packet->command(),
                packet->rssi(),
              ]

espnow_find:

interval:
  - interval: 120sec
    startup_delay: 180sec
    then:
      - espnow.channel.set: 5
      - espnow.peer.find:
          success:
            - logger.log:
                format: "Peer has BEEN found."
                level: info
            - espnow.send:
                command: 0x47
                payload: "Load error base ."
                dont_wait: true
          failed:
            - logger.log:
                format: "Peer has NOT been found."
                level: error
