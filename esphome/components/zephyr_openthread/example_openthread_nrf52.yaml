esphome:
  name: openthread-nrf52-example
  friendly_name: OpenThread NRF52 Example

# Use nrf52 platform with zephyr framework
nrf52:
  board: adafruit_itsybitsy_nrf52840
  bootloader: mcuboot

# Enable logging
logger:
  level: DEBUG
  baud_rate: 115200

# Enable IPv6 networking
network:
  enable_ipv6: true

# Enable OpenThread
zephyr_openthread:
  channel: 15
  panid: 43981
  network_name: "ESPHome-Thread"
  xpanid: "FEDCBA9876543210"
  network_key: "00112233445566778899AABBCCDDEEFF"
  pskc: "00112233445566778899AABBCCDDEEFF"
  radio_tx_power: 0
  force_dataset: false

# Enable mDNS for service discovery
mdns:
  # mDNS services will be automatically bridged to Thread SRP

# Enable API for Home Assistant integration
api:
  encryption:
    key: "YourEncryptionKeyHere"

# Example sensor
sensor:
  - platform: uptime
    name: Uptime
    update_interval: 60s

# Example binary sensor
binary_sensor:
  - platform: gpio
    pin: 7
    name: "Button"
    internal: true

# Example output
output:
  - platform: gpio
    pin: 13
    id: led_pin

# Example light
light:
  - platform: binary
    name: "LED"
    output: led_pin
