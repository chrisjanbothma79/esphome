---
esphome:
  name: test

esp8266:
  board: d1_mini_lite

spi:
  clk_pin: GPIO18
  mosi_pin: GPIO23
  miso_pin: GPIO19

display:
  platform: ili9xxx
  id: lcd
  model: M5STACK
  dc_pin: GPIO15
  cs_pin: GPIO5

touchscreen:
  platform: ft63x6
  id: touch
  interrupt_pin: GPIO39

binary_sensor:
  - platform: gpio
    id: bs_1
    name: test bs1
    internal: true
    pin:
      number: D0
  - platform: gpio
    id: bs_2
    name: test bs2
    internal: false
    pin:
      number: D1
  - platform: touchscreen
    id: bs_3
    name: test bs3
    x_min: 100
    x_max: 200
    y_min: 300
    y_max: 400
    use_raw: true
  - platform: touchscreen
    id: bs_4
    name: test bs4
    x_min: 100
    x_max: 200
    y_min: 300
    y_max: 400
