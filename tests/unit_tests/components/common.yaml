esphome:
  libraries:
    google/googletest@^1.15.2
  platformio_options:
    build_type: debug
    test_framework: googletest
    build_unflags:
      - "-Os"  # remove size-opt flag
    build_flags:
      - "-Og"  # optimize for debug
    debug_build_flags:  # only for debug builds
      - "-g3"  # max debug info
      - "-ggdb3"
  includes:
    - main.cpp

host:

logger:
  level: DEBUG
