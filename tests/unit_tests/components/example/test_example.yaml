# Example test configuration

# The below pulls in the testing framework configuration:
packages:
  esphome_testing: !include ../main.yaml

esphome:
  # Give your test configuration a unique name in this folder
  name: test-example

  # List here all the files containing tests:
  includes:
    - example.cpp

# Include below the simplest valid config for the component you are testing
# The configuration won't be used nor ran. This is just so the component code
# is pulled into the build.

# In this example, we add the uart component. Replace the below with yours.

uart:
  port: "/dev/ttyDUMMY"
  baud_rate: 9600

