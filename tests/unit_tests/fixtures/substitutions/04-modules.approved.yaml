substitutions:
  display_scale: 1.5
  a: 10
  b: 4
  c: 79
  func: double
jinja:
  macros:
    multiply:
      parameters:
        a: 3
        b: 4
      return: a*b
    modulus:
      parameters:
        vec:
          x: 0
          y: 0
      return: math.sqrt(vec.x*vec.x+vec.y*vec.y)
  vars:
    a: 7
    b: 0
    c: 3
    d: 82
    position:
      x: 4
      y: 3
  templates:
    - '<% macro scale(x, factor = None) %>

      ${ (x * (display_scale if factor is none else factor)) | round | int }

      <% endmacro %>

      '
    - '<% macro square(x) %>

      ${ x*x }

      <% endmacro %>

      '
    - '<% macro double(x) %>

      ${ 2*x }

      <% endmacro %>

      '
    - "<% macro pin(number=10, inverted=false) %>\n  <% if number > 20 %>${\n    {\n\
      \        \"number\": number,\n        \"inverted\" : inverted,\n        \"pullup\"\
      : true\n    }\n  }<% else %>${\n    {\n        \"number\": number,\n       \
      \ \"inverted\" : inverted,\n    }\n  }<% endif %>\n<% endmacro %>\n"
testlist:
  - The value of c is 79, substitution is evaluated first
  - Even if I do this, c is still 79.
  - Substitutions are evaluated before jinja, 20
  - The value of d is 82 since it is defined as a var
  - Position x=4, y=3
  - Distance = 5
  - multiply(6,7) = 42
  - multiply(2) = 8, because parameter b has a default value of 4
  - multiply(a=5, b=7) = 35
  - scale(100) = 150
  - scale(100, 1.377892) = 138
  - square(a) = 100
  - double(b) = 8
  - number: 10
    inverted: true
  - number: 10
    inverted: false
  - number: 22
    inverted: false
    pullup: true
