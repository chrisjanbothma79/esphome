esphome:
  name: ${name}
  build_path: ${build_path}
  friendly_name: ESPHome Host Mode API Password Test
  name_add_mac_suffix: no
  area: Entryway
  platformio_options:
    build_flags:
      - -std=gnu++17
      - -Wall
    build_unflags:
      - -std=gnu++11

api:
  password: "test_password_123"

logger:
  level: DEBUG

# Test sensor to verify connection works
sensor:
  - platform: template
    name: Test Sensor
    id: test_sensor
    lambda: |-
      return 42.0;
    update_interval: 1s
