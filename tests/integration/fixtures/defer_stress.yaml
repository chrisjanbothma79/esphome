esphome:
  name: defer-stress-test

external_components:
  - source:
      type: local
      path: EXTERNAL_COMPONENT_PATH
    components: [defer_stress_component]

host:

logger:
  level: DEBUG

defer_stress_component:
  id: defer_stress

api:
  services:
    - service: run_stress_test
      then:
        - lambda: |-
            id(defer_stress)->run_multi_thread_test();
        - wait_until:
            lambda: |-
              return id(defer_stress)->is_test_complete();
        - lambda: |-
            if (id(defer_stress)->is_test_passed()) {
              id(test_result)->trigger("passed");
            } else {
              id(test_result)->trigger("failed");
            }
            id(test_complete)->trigger("test_finished");

event:
  - platform: template
    name: "Test Complete"
    id: test_complete
    device_class: button
    event_types:
      - "test_finished"
  - platform: template
    name: "Test Result"
    id: test_result
    device_class: button
    event_types:
      - "passed"
      - "failed"
