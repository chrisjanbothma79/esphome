oneshot_timer:
  - id: timer1
    interval: 5s
    auto_start: false
    on_timeout:
      - logger.log: Timeout
    on_start:
      - logger.log: Start
    on_pause:
      - logger.log: Pause

button:
  - platform: template
    id: start_default_interval
    on_press:
      oneshot_timer.start: timer1

  - platform: template
    id: start_specified_interval
    on_press:
      oneshot_timer.start:
        id: timer1
        interval: 10s

  - platform: template
    id: pause_timer
    on_press:
      oneshot_timer.pause: timer1

  - platform: template
    id: resume_timer
    on_press:
      oneshot_timer.resume: timer1
