camera_encoder:
  id: jpeg_encoder

camera:
  - platform: template
    id: test_camera
    name: Test Camera
    camera_encoder_id: jpeg_encoder
    width: 256
    height: 256
    image_format: BGR888

camera_scaler:
  camera_id: test_camera
  type: default
  width: 64
  height: 64
  flip_x: True
  flip_y: True
  image_format: GRAYSCALE
  algorithm: BILINEAR
  clear: True
  margins: {left: 8, right: 8, top: 8, bottom: 8}
