display:
  - platform: sdl
    auto_clear_enabled: false
    dimensions:
      width: 480
      height: 480

image:
  binary:
    - id: binary_image
      file: ../../pnglogo.png
      dither: FloydSteinberg
    - id: transparent_transparent_image
      file: ../../pnglogo.png
      use_transparency: chroma_key
  rgb:
    - id: rgba_image
      file: ../../pnglogo.png
      use_transparency: alpha_channel
      resize: 50x50
    - id: rgb24_image
      file: ../../pnglogo.png
      type: RGB # accepts only same type as above.
      use_transparency: chroma_key
    - id: rgb_image
      file: ../../pnglogo.png
      use_transparency: none
  rgb565:
    - id: rgb565_image
      file: ../../pnglogo.png
      use_transparency: none
    - id: rgb565_ck_image
      file: ../../pnglogo.png
      use_transparency: chroma_key
    - id: rgb565_alpha_image
      file: ../../pnglogo.png
      use_transparency: alpha_channel
  grayscale:
    - id: grayscale_alpha_image
      file: ../../pnglogo.png
      use_transparency: alpha_channel
      resize: 50x50
    - id: grayscale_ck_image
      file: ../../pnglogo.png
      use_transparency: chroma_key
    - id: grayscale_image
      file: ../../pnglogo.png
      use_transparency: none
