remote_receiver:
  - id: rcvr
    pin: ${pin}
    rmt_channel: ${rmt_channel}
    dump: all
    tolerance: 25%
    <<: !include common-actions.yaml

binary_sensor:
  - platform: remote_receiver
    name: Panasonic Remote Input
    panasonic:
      address: 0x4004
      command: 0x100BCBD
  - platform: remote_receiver
    name: "KWORLD Remote KW Button"
    nec:
      address: 0x6B86
      command: 0xF30C
      timeout: 125ms
