i2c:
  - id: i2c_htk16k33
    scl: ${scl_pin}
    sda: ${sda_pin}

display:
  - platform: htk16k33
    id: ht16k33_display
    i2c_id: i2c_htk16k33
    intensity: 15
    update_interval: 15s
    rotate_chip: 90
    flip_x: true
    lambda: |-
      it.filled_rectangle(0, 0, 5, 8, ht16k33::CL);
      it.filled_rectangle(11, 0, 5, 8, ht16k33::CH);
