uart:
  - id: uart_mk2pvrouter
    tx_pin: ${tx_pin}
    rx_pin: ${rx_pin}
    baud_rate: 9600

button:
  - platform: template
    name: Poller component suspend test
    on_press:
      - component.suspend: test_mk2pvrouter
      - delay: 20s
      - component.update: test_mk2pvrouter
      - delay: 20s
      - component.resume: test_mk2pvrouter
      - delay: 20s
      - component.resume:
          id: test_mk2pvrouter
          update_interval: 2s
      - delay: 20s
      - component.resume:
          id: test_mk2pvrouter
          update_interval: !lambda return 2500;

mk2pvrouter:
  id: test_mk2pvrouter
  update_interval: 60s

sensor:
  - platform: mk2pvrouter
    name: Power
    tag_name: P
    mk2pvrouter_id: test_mk2pvrouter
    unit_of_measurement: Wh

text_sensor:
  - platform: mk2pvrouter
    name: S per MC
    tag_name: S_MC
    mk2pvrouter_id: test_mk2pvrouter
