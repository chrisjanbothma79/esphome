espnow:
  auto_add_peer: true
  channel: 1
  peers:
    - 11:22:33:44:55:66
  on_receive:
    - logger.log:
        format: "Received from: %s = '%s'  RSSI: %d"
        args:
          - format_mac_address_pretty(info.src_addr).c_str()
          - format_hex_pretty(data, size).c_str()
          - info.rx_ctrl->rssi
    - espnow.send:
        address: 11:22:33:44:55:66
        data: "Hello from ESPHome"
    - espnow.broadcast:
        data: "Hello, World!"
    - espnow.peer.add:
        address: 11:22:33:44:55:66
    - espnow.peer.delete:
        address: 11:22:33:44:55:66
