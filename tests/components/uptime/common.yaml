wifi:
  ap:

time:
  - platform: sntp

sensor:
  - platform: uptime
    name: Uptime Sensor
  - platform: uptime
    name: Uptime Sensor Seconds
    type: seconds
  - platform: uptime
    name: Uptime Sensor Timestamp
    type: timestamp

text_sensor:
  - platform: uptime
    name: Uptime Text
  - platform: uptime
    name: Uptime Text With Separator
    separator: "-"
    update_interval: 10s
