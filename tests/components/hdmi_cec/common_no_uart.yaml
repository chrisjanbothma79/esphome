esphome:
  name: "hdmi-cec-test"
  on_boot:
    priority: -100
    then:
      - delay: 50ms
      - lambda: !lambda |-
          // send 'Give Physical Address' message to myself: that shall give a reply message
          id(cec).send(0x1, id(cec).address(), {0x83});
          // generated the reply message is a broadcast, created by the component built-in handler
          // such broadcast does not expect an active 'acknowledge' bit
          id(cec).send(0x1, id(cec).address(), {0x8F}); // send 'Give Device Power Status' to myself
          // the generated reply message is probably not acknowledged, so will be repeated 5 times

# Enable logging
logger:
  level: DEBUG

hdmi_cec:
  id: cec
  pin:   # to HDMI pin 13 (CEC), with HDMI pin 17 (DDC/CEC ground)
    number: ${cec_pin}
    mode:
      input: true
      pullup: true

  address: 0x5
  physical_address: 0x4000
  promiscuous_mode: true
  on_message:
    # Give Device Power Status
    - opcode: 0x8F
      then:
        - lambda: !lambda |-
            id(cec).send(source, {0x90, 0x01});
     # Volume Up from TV remote
    - data: [0x44, 0x41]
      then:
        - logger.log: "HDMI-CEC Volume Up"
