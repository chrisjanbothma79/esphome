esphome:
  name: test
  on_boot:
    then:
      - sdfs.write_file:
          path: "/test.txt"
          mode: "write"
          data: !lambda |-
            std::string tstring("Hello world.");
            return std::vector<uint8_t>(tstring.begin(), tstring.end())

spi:
  id: spi_1
  clk_pin: ${clk_pin_name}
  miso_pin: ${miso_pin_name}
  mosi_pin: ${mosi_pin_name}

sdfs:
  id: sdfs_1
  spi_id: spi_1
  type: sdspi
  cs_pin: ${cs_pin_name}
  on_state_changed:
    then:
      - logger.log:
          format: "State changed %d"
          args: [x]

