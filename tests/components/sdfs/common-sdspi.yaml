esphome:
  name: test
  on_boot:
    then:
      - sdfs.write_file:
          path: "/test.txt"
          mode: "write"
          data: !lambda |-
            std::string tstring("Hello world.");
            return std::vector<uint8_t>(tstring.begin(), tstring.end())

spi:
  id: spi_1
  clk_pin: ${clk_pin_name}
  miso_pin: ${miso_pin_name}
  mosi_pin: ${mosi_pin_name}

sdfs:
  id: sdfs_1
  spi_id: spi_1
  type: sdspi
  cs_pin: ${cs_pin_name}
  on_state:
    then:
      - lambda: |-
          ESP_LOGD("lambda", "State changed %d",x);

script:
  - id: test_script
    then:
      - if:
          condition:
            or:
              - sdfs.is_size_le:
                  id: sdfs_1
                  path: "/"
                  size: 10000
              - sdfs.is_state:
                  id: sdfs_1
                  state: 1
          then:
            - lambda: |-
                ESP_LOGD("lambda", "Condition TRUE");
