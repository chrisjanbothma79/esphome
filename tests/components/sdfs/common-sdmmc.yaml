esphome:
  name: test
  on_boot:
    then:
      - sdfs.write_file:
          path: "/test.txt"
          mode: "write"
          data: !lambda |-
            std::string tstring("Hello world.");
            return std::vector<uint8_t>(tstring.begin(), tstring.end());

sdfs:
  id: sdfs_1
  type: sdmmc
  bus_width: "1bit"
  bus_slot: ${slot_id_name}
  clk_pin: ${clk_pin_name}
  cmd_pin: ${cmd_pin_name}
  data0_pin: ${data0_pin_name}
  on_state:
    then:
      - logger.log:
          format: "State changed %d"
          args: [x]

script:
  - id: test_script
    then:
      - if:
          condition:
            or:
              - sdfs.is_size_le:
                  id: sdfs_1
                  path: "/"
                  size: 10000
              - sdfs.is_state:
                  id: sdfs_1
                  state: 1
        then:
          - lambda: |-
              ESP_LOGD("lambda", "Condition TRUE");
