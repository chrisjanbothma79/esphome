spi:
  clk_pin: ${clk_pin}
  mosi_pin: ${mosi_pin}
  miso_pin: ${miso_pin}

sx127x:
  cs_pin: ${cs_pin}
  rst_pin: ${rst_pin}
  dio0_pin: ${dio0_pin}
  frequency: 868100000
  modulation: LORA
  bandwidth: 250_0kHz  # Was 125.0
  spreading_factor: 10 # Was 7 (default)
  coding_rate: CR_4_8  # Was CR_4_5 (default)
  rx_start: true
  rx_floor: -90

lora:
  - platform: sx127x
    id: test_lora
    name: Test LoRa

packet_transport:
  - platform: lora
    id: packet_transport_lora
    lora_id: lora_conf
