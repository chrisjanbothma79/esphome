uart:
  - id: mmwave_uart
    tx_pin: ${tx_pin}
    rx_pin: ${rx_pin}
    baud_rate: 9600

dfrobot_c4001:
  id: mmwave_sensor
  uart_id: mmwave_uart

binary_sensor:
  - platform: dfrobot_c4001
    dfrobot_c4001_id: mmwave_sensor
    occupancy:
      name: Occupancy
    config_changed:
      name: Config Changed

number:
  - platform: dfrobot_c4001
    dfrobot_c4001_id: mmwave_sensor
    max_range:
      name: Range Max
    min_range:
      name: Range Min
    trigger_range:
      name: Range Trigger
    hold_sensitivity:
      name: Sensitivity Hold
    trigger_sensitivity:
      name: Sensitivity Trigger
    on_latency:
      name: Latency On
    off_latency:
      name: Latency Off
    inhibit_time:
      name: Inhibit Time
