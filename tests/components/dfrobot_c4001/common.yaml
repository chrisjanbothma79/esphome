uart:
  - id: mmwave_uart
    tx_pin: ${tx_pin}
    rx_pin: ${rx_pin}
    baud_rate: 9600

dfrobot_c4001:
  id: mmwave_sensor
  uart_id: mmwave_uart
  mode: PRESENCE

binary_sensor:
  - platform: dfrobot_c4001
    config_changed:
      name: Config Changed
    occupancy:
      id: occupancy_uart
      name: Occupancy via UART

button:
  - platform: dfrobot_c4001
    config_save:
      name: Config Save
      entity_category: CONFIG
    factory_reset:
      name: Factory Reset
    restart:
      name: Restart

number:
  - platform: dfrobot_c4001
    dfrobot_c4001_id: mmwave_sensor
    max_range:
      name: Range Max
    min_range:
      name: Range Min
    trigger_range:
      name: Range Trigger
    hold_sensitivity:
      name: Sensitivity Hold
    trigger_sensitivity:
      name: Sensitivity Trigger
    on_latency:
      name: Latency On
    off_latency:
      name: Latency Off
    inhibit_time:
      name: Inhibit Time

switch:
  - platform: dfrobot_c4001
    dfrobot_c4001_id: mmwave_sensor
    led_enable:
      name: Enable LED

text_sensor:
  - platform: dfrobot_c4001
    software_version:
      name: Software Version
    hardware_version:
      name: Hardware Version
