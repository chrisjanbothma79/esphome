uart:
  - id: mmwave_uart
    tx_pin: ${tx_pin}
    rx_pin: ${rx_pin}
    baud_rate: 9600

dfrobot_c4001:
  id: mmwave_sensor
  uart_id: mmwave_uart

binary_sensor:
  - platform: dfrobot_c4001
    dfrobot_c4001_id: mmwave_sensor
    occupancy:
      id: occupancy_uart
      name: Occupancy via UART
