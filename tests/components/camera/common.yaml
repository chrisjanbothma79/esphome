camera:
  name: Camera
  height: 64
  width: 64
  image_format: RGB888
  on_capture_image:
    - lambda: |-
        static uint8_t cnt = 0;
        uint8_t *rgb = image.data;
        for (uint8_t x = 0; x < spec.width; ++x) {
          for (uint8_t y = 0; y < spec.height; ++y) {
            int idx = y * spec.bytes_per_row() + x * spec.bytes_per_pixel();
            rgb[idx + 0] = cnt + x;
            rgb[idx + 1] = cnt + y;
            rgb[idx + 2] = cnt + x + y;
          }
        }
        ++cnt;
